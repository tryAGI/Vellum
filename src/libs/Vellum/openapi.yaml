          {
            "name": "entity_status",
            "in": "query",
            "description": "Filter down to only those objects whose entities have a status matching the status specified.\n\n* `ACTIVE` - Active\n* `ARCHIVED` - Archived\n* `PENDING_DELETION` - Pending Deletion",
            "required": false,
            "schema": {
